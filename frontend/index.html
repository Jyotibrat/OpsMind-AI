<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpsMind AI — Employee Assistant</title>
  <meta name="description" content="OpsMind AI: Ask questions about company policies and get answers grounded in official documents." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* Page-specific overrides for single-page layout */
    .chat-only-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-only-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .header-logo .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #4f83ff, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-badge {
      padding: 2px 9px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(79, 131, 255, 0.15);
      color: var(--accent-light);
      border: 1px solid rgba(79, 131, 255, 0.3);
      border-radius: 99px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .admin-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      color: var(--text-secondary);
      transition: var(--transition);
      font-weight: 500;
    }

    .admin-link:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
      background: var(--bg-card);
    }

    .chat-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="chat-only-shell">

  <!-- ── Top Bar ─────────────────────────────────────────────────────────── -->
  <header class="chat-only-header">
    <div class="header-left">
      <div class="header-logo">
        <div class="logo-icon">🧠</div>
        <span>OpsMind AI</span>
      </div>
      <span class="header-badge">RAG · Gemini 2.5 Flash</span>
    </div>

    <div class="header-right">
      <div class="status-indicator">
        <span class="online-dot"></span>
        Online
      </div>
      <a href="admin.html" class="admin-link">⚙️ Admin Panel</a>
    </div>
  </header>

  <!-- ── Chat Body ──────────────────────────────────────────────────────── -->
  <main class="chat-body">

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome" id="welcome-state">

        <div class="welcome-icon">🧠</div>
        <h1 class="welcome-title">OpsMind AI</h1>
        <p class="welcome-sub">
          Ask any question about company policies and I'll answer strictly from
          the official documents — with page citations and confidence scores.
        </p>

        <div class="quick-chips">
          <button class="chip" data-q="What is the annual leave entitlement?">📅 Leave Policy</button>
          <button class="chip" data-q="What are the remote work guidelines?">🏠 Remote Work</button>
          <button class="chip" data-q="How are travel expenses reimbursed?">✈️ Travel Reimbursement</button>
          <button class="chip" data-q="What is the IT security policy?">🔐 IT Security</button>
          <button class="chip" data-q="How can I raise a grievance?">📢 Grievance Policy</button>
          <button class="chip" data-q="What are the payroll guidelines?">💰 Payroll</button>
        </div>

      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Ask about company policies…"
          rows="1"
          aria-label="Ask a question"
        ></textarea>
        <button class="send-btn" id="send-btn" disabled title="Send (Enter)">
          ➤
        </button>
      </div>
      <p class="input-disclaimer">
        Answers are grounded in official corporate documents only · Powered by Gemini 2.5 Flash
      </p>
    </div>

  </main>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="js/chat.js"></script>
</body>
</html>
